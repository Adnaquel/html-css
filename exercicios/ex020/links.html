<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    a {
        color: red;
        text-decoration: none;
        font-weight: bold;
    }
    a:visited {
        color: darkred;
    }

    a:hover {
        color: black;
        text-decoration: underline;
    }

    a:active {
        color: yellow;
    }

    .especial {
        background-color: rgba(124, 36, 36, 0.351);
    }
    .especial::after {
        content: "→";
    }

    .especial::before {
        content: "←";
    }
</style>
</head>
<body>
    <h1>Personalizando links</h1>
    <p><ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" class="especial">Repositório Gitub</a></li>
        <li><a href="https://www.youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Cursoemvideo</a></li>
    </ul></p>
</body>
</html>
